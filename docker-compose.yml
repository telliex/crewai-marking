# Local Postgres for the outreach service.
#   docker compose up -d        # start
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop + wipe data
services:
  db:
    image: postgres:16
    container_name: awkns-outreach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
      POSTGRES_DB: outreach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
