<script>
// Shared rich-text editor runtime for `_rich_editor.html`. Include this
// partial once per page (not once per editor instance) and call
// `twInitEditor(rootEl)` for each `.tw-editor` root found on the page.
// All per-instance state (the Quill instance, its attachments array, code
// view flag, and the body-sync callback) lives on `rootEl._tw` — nothing is
// stored in module-level globals — so multiple editors can coexist safely.

function twEscapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function twInitEditor(rootEl) {
  const quill = new Quill(rootEl.querySelector('.tw-quill-editor'), {
    theme: 'snow',
    modules: { toolbar: rootEl.querySelector('.tw-quill-toolbar') },
    formats: ['bold', 'italic', 'underline', 'blockquote', 'list', 'indent', 'link', 'image'],
    placeholder: 'Hi {first_name},\n\n{angle}\n\n{sender_name}',
  });
  rootEl._tw = { quill, attachments: [], codeViewOn: false };

  const bodyInitialEl = rootEl.querySelector('.tw-body-initial');
  const rawBody = bodyInitialEl ? bodyInitialEl.value : '';
  if (rawBody) {
    if (rawBody.includes('<')) {
      quill.clipboard.dangerouslyPasteHTML(rawBody);
    } else {
      // Legacy plain-text template (predates the rich-text editor): preserve
      // blank-line paragraph breaks the same way the old send pipeline did.
      const html = rawBody.split(/\n{2,}/).map(
        (p) => '<p>' + p.split('\n').map(twEscapeHtml).join('<br>') + '</p>'
      ).join('');
      quill.clipboard.dangerouslyPasteHTML(html);
    }
  }

  const bodyField = rootEl.querySelector('.tw-body-field');
  function twSyncBody() {
    bodyField.value = quill.getText().trim() === '' ? '' : quill.root.innerHTML;
    bodyField.dispatchEvent(new Event('input', { bubbles: true }));
  }
  rootEl._tw.syncBody = twSyncBody;
  quill.on('text-change', twSyncBody);
  twSyncBody();

  const attachmentsInitialEl = rootEl.querySelector('.tw-attachments-initial');
  const rawAttachments = attachmentsInitialEl ? attachmentsInitialEl.value : '';
  try {
    rootEl._tw.attachments = rawAttachments ? JSON.parse(rawAttachments) : [];
  } catch (e) {
    rootEl._tw.attachments = [];
  }
  twRenderAttachmentChips(rootEl);
}

function twInsertAtCursor(btn, text) {
  const root = btn.closest('.tw-editor');
  const quill = root._tw.quill;
  const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
  quill.insertText(range.index, text, 'user');
  quill.setSelection(range.index + text.length, 0);
}

function twToggleFormatHelp(btn) {
  const root = btn.closest('.tw-editor');
  root.querySelector('.tw-format-help').classList.toggle('hidden');
}

function twOpenLinkPopover(btn) {
  const root = btn.closest('.tw-editor');
  root.querySelector('.tw-link-popover').classList.remove('hidden');
}

function twCloseLinkPopover(btn) {
  const root = btn.closest('.tw-editor');
  root.querySelector('.tw-link-popover').classList.add('hidden');
}

function twInsertLink(btn) {
  const root = btn.closest('.tw-editor');
  const quill = root._tw.quill;
  const urlEl = root.querySelector('.tw-link-url');
  const labelEl = root.querySelector('.tw-link-label');
  const url = urlEl.value.trim();
  const label = labelEl.value.trim() || url;
  if (!url) return;
  const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
  quill.insertText(range.index, label, 'link', url, 'user');
  quill.setSelection(range.index + label.length, 0);
  urlEl.value = '';
  labelEl.value = '';
  twCloseLinkPopover(btn);
}

function twFormatBytes(n) {
  if (!n) return '';
  if (n < 1024) return n + ' B';
  return n < 1024 * 1024 ? (n / 1024).toFixed(1) + ' KB' : (n / (1024 * 1024)).toFixed(1) + ' MB';
}

function twRenderAttachmentChips(root) {
  const el = root.querySelector('.tw-attachment-chips');
  el.innerHTML = root._tw.attachments.map((att, i) => `
    <span class="inline-flex items-center gap-1 rounded border bg-slate-50 px-2 py-1 text-xs text-slate-600">
      &#128206; ${twEscapeHtml(att.filename)}${att.size ? ' (' + twFormatBytes(att.size) + ')' : ''}
      <button type="button" onclick="twRemoveAttachment(this, ${i})" class="ml-1 text-slate-400 hover:text-red-600" title="Remove">&times;</button>
    </span>
  `).join('');
}

function twSyncAttachments(root) {
  const field = root.querySelector('.tw-attachments-field');
  field.value = JSON.stringify(root._tw.attachments);
  field.dispatchEvent(new Event('input', { bubbles: true }));
  twRenderAttachmentChips(root);
}

function twRemoveAttachment(btn, i) {
  const root = btn.closest('.tw-editor');
  root._tw.attachments.splice(i, 1);
  twSyncAttachments(root);
}

async function twAttachmentPicked(input) {
  if (!input.files || !input.files.length) return;
  const root = input.closest('.tw-editor');
  const file = input.files[0];
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/templates/upload-attachment', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Upload failed');
    }
    const meta = await res.json();
    root._tw.attachments.push(meta);
    twSyncAttachments(root);
  } catch (e) {
    alert('Attachment upload failed: ' + e.message);
  } finally {
    input.value = '';
  }
}

async function twImagePicked(input) {
  if (!input.files || !input.files.length) return;
  const root = input.closest('.tw-editor');
  const quill = root._tw.quill;
  const file = input.files[0];
  const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/templates/upload-image', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Upload failed');
    }
    const { url } = await res.json();
    quill.insertEmbed(range.index, 'image', url, 'user');
    quill.setSelection(range.index + 1, 0);
  } catch (e) {
    alert('Image upload failed: ' + e.message);
  } finally {
    input.value = '';
  }
}

function twToggleCodeView(btn) {
  const root = btn.closest('.tw-editor');
  const state = root._tw;
  const quill = state.quill;
  const editorEl = root.querySelector('.tw-quill-editor');
  const sourceEl = root.querySelector('.tw-quill-source');
  if (!state.codeViewOn) {
    sourceEl.value = quill.getText().trim() === '' ? '' : quill.root.innerHTML;
    editorEl.classList.add('hidden');
    sourceEl.classList.remove('hidden');
  } else {
    quill.setText('');
    if (sourceEl.value.trim()) {
      quill.clipboard.dangerouslyPasteHTML(sourceEl.value);
    }
    sourceEl.classList.add('hidden');
    editorEl.classList.remove('hidden');
    state.syncBody();
  }
  state.codeViewOn = !state.codeViewOn;
  btn.classList.toggle('ql-active', state.codeViewOn);
}
</script>
