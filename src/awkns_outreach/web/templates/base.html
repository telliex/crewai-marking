<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Awkns Outreach{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="border-b bg-white">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="font-semibold text-slate-900">Awkns Outreach</a>
      <nav class="text-sm text-slate-500 flex gap-4">
        <a href="/" class="hover:text-slate-900">Campaigns</a>
        <a href="/campaigns/new" class="hover:text-slate-900">New campaign</a>
        <a href="/mailboxes" class="hover:text-slate-900">Mailboxes</a>
        <a href="/templates" class="hover:text-slate-900">Templates</a>
      </nav>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-4 py-6">
    {% if msg %}
    <div class="mb-4 rounded border border-blue-200 bg-blue-50 px-3 py-2 text-sm text-blue-800">{{ msg }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
