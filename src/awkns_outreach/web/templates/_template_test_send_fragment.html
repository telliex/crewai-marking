<div id="test-send-widget" class="tw-test-send-widget flex flex-col gap-2">
  <div class="flex items-center gap-2">
    <select name="mailbox_id" id="mailbox-field" class="tw-mailbox-field border rounded px-2 py-1.5 text-sm"
            onchange="twMailboxFieldChanged(this)">
      <option value="">Resend (default)</option>
      {% for mb in mailboxes %}
      <option value="{{ mb.id }}" {% if selected_mailbox_id and mb.id == selected_mailbox_id %}selected{% endif %}>{{ mb.email }}</option>
      {% endfor %}
      <option value="__custom__" {% if selected_mailbox_id == "__custom__" %}selected{% endif %}>Custom recipients</option>
    </select>
    <input type="text" name="custom_recipients" id="custom-recipients-field"
           value="{{ custom_recipients or '' }}"
           placeholder="email1@example.com, email2@example.com"
           class="tw-custom-recipients-field border rounded px-2 py-1.5 text-sm flex-1 {% if selected_mailbox_id != '__custom__' %}hidden{% endif %}">
    <button type="button" id="test-send-button"
            class="tw-test-send-button rounded bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-sm font-medium px-4 py-2 whitespace-nowrap"
            hx-post="/templates/test-send-fragment"
            hx-include="{{ test_send_include | default('#subject-field,#body-field,#attachments-field,#mailbox-field,#custom-recipients-field') }}"
            hx-target="closest .tw-test-send-widget" hx-swap="outerHTML">
      {% if selected_mailbox_id == "__custom__" %}Send Test Email{% else %}Send Test Email to Me{% endif %}
    </button>
  </div>
  {% if msg %}<div class="text-xs text-slate-600 whitespace-pre-line">{{ msg }}</div>{% endif %}
</div>
<script>
  // Defined here (not in the pages that include this fragment) so it works
  // for any number of test-send widgets on a page: multiple templates once
  // had to live in the same script that owned #custom-recipients-field /
  // #test-send-button by id, which broke when a page has N widgets (the
  // sequence editor). Resolve everything relative to the widget that owns
  // the <select> that changed, via .closest('.tw-test-send-widget').
  // Re-declared harmlessly on every HTMX swap of this fragment.
  function twMailboxFieldChanged(select) {
    const widget = select.closest('.tw-test-send-widget');
    const isCustom = select.value === '__custom__';
    widget.querySelector('.tw-custom-recipients-field').classList.toggle('hidden', !isCustom);
    widget.querySelector('.tw-test-send-button').textContent = isCustom ? 'Send Test Email' : 'Send Test Email to Me';
  }
</script>
