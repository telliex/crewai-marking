<div id="test-send-widget" class="flex flex-col gap-2">
  <div class="flex items-center gap-2">
    <select name="mailbox_id" id="mailbox-field" class="border rounded px-2 py-1.5 text-sm"
            onchange="twMailboxFieldChanged(this)">
      <option value="">Resend (default)</option>
      {% for mb in mailboxes %}
      <option value="{{ mb.id }}" {% if selected_mailbox_id and mb.id == selected_mailbox_id %}selected{% endif %}>{{ mb.email }}</option>
      {% endfor %}
      <option value="__custom__" {% if selected_mailbox_id == "__custom__" %}selected{% endif %}>Custom recipients</option>
    </select>
    <input type="text" name="custom_recipients" id="custom-recipients-field"
           value="{{ custom_recipients or '' }}"
           placeholder="email1@example.com, email2@example.com"
           class="border rounded px-2 py-1.5 text-sm flex-1 {% if selected_mailbox_id != '__custom__' %}hidden{% endif %}">
    <button type="button" id="test-send-button"
            hx-post="/templates/test-send-fragment"
            hx-include="#subject-field,#body-field,#attachments-field,#mailbox-field,#custom-recipients-field"
            hx-target="#test-send-widget" hx-swap="outerHTML"
            class="rounded bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-sm font-medium px-4 py-2 whitespace-nowrap">
      {% if selected_mailbox_id == "__custom__" %}Send Test Email{% else %}Send Test Email to Me{% endif %}
    </button>
  </div>
  {% if msg %}<div class="text-xs text-slate-600 whitespace-pre-line">{{ msg }}</div>{% endif %}
</div>
